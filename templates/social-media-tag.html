<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Social Media Tag</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Outfit', sans-serif;
    }

    body {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 0 90px 80px 0;
    }

    .lt-wrapper {
      position: relative;
      opacity: 0;
      transform: translateX(50px);
    }

    .lt-wrapper.active {
      opacity: 1;
      transform: translateX(0);
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .lt-wrapper.exit {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .social-bar {
      display: flex;
      align-items: center;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 32px 8px 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .icon-container {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 16px;
      box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
    }

    .icon-container svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .handle-text {
      color: white;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .platform-text {
      color: #94a3b8;
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: -2px;
    }

  </style>
</head>
<body>

  <div class="lt-wrapper" id="panel">
    <div class="social-bar">
      <div class="icon-container" id="icon-bg">
        <svg id="social-icon" viewBox="0 0 24 24">
          <!-- Default to Instagram icon -->
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
      </div>
      <div class="text-container">
        <div class="handle-text" id="handle">@usuario_oficial</div>
        <div class="platform-text" id="platform">Síguenos</div>
      </div>
    </div>
  </div>

  <script>
    let isVisible = false;
    const panel = document.getElementById('panel');

    function play() {
      if (isVisible) {
        panel.classList.remove('active');
        panel.classList.add('exit');
        setTimeout(() => panel.classList.remove('exit'), 500); 
        isVisible = false;
      } else {
        panel.classList.remove('exit');
        void panel.offsetWidth;
        panel.classList.add('active');
        isVisible = true;
      }
    }

    function update(incomingChange) {
      try {
        const changes = JSON.parse(incomingChange);
        Object.entries(changes).forEach(([key, value]) => {
          const el = document.getElementById(key);
          if (el && value !== undefined) {
            el.innerText = value;
          }
        });
      } catch (e) {
        console.error("Error al actualizar:", e);
      }
    }
  
    // Fallback: escuchar mensajes postMessage de Orbit y leer URL params
    window.addEventListener('message', (e) => {
      if (e.data?.action === 'update' && e.data.variables) {
        if (typeof update === 'function') {
          update(JSON.stringify(e.data.variables));
        }
      }
      if (e.data?.action === 'out') {
        if (typeof play === 'function') {
          if (isVisible) play();
        }
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const vars = {};
      for(let [k,v] of params) {
        if(k !== 'path') vars[k] = v;
      }
      if(Object.keys(vars).length > 0 && typeof update === 'function') {
        update(JSON.stringify(vars));
      }
    });
  </script>

  <script name="graphics-data-definition" type="application/json+gdd">
    {
      "$schema": "https://superflytv.github.io/GraphicsDataDefinition/gdd-meta-schema/v1/schema.json",
      "title": "Social Media Tag",
      "type": "object",
      "properties": {
        "handle": {
          "type": "string",
          "label": "Usuario / Handle",
          "default": "@usuario_oficial",
          "gddType": "single-line"
        },
        "platform": {
          "type": "string",
          "label": "Plataforma (Ej: Instagram, Twitter)",
          "default": "SÍGUENOS EN INSTAGRAM",
          "gddType": "single-line"
        }
      }
    }
  </script>
</body>
</html>
