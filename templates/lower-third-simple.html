<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lower Third Simple</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #lower-third {
      position: absolute;
      bottom: 100px;
      left: 80px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transform: translateY(120%);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    }

    #lower-third.in {
      transform: translateY(0);
      opacity: 1;
    }

    #lower-third.out {
      transform: translateY(120%);
      opacity: 0;
    }

    #accent-bar {
      width: 5px;
      height: 100%;
      background: linear-gradient(180deg, #7c3aed, #4f46e5);
      border-radius: 4px;
      position: absolute;
      left: 0;
    }

    #lt-content {
      background: rgba(10, 10, 18, 0.92);
      backdrop-filter: blur(8px);
      border-left: 5px solid #7c3aed;
      padding: 14px 28px;
      min-width: 400px;
      max-width: 700px;
      position: relative;
    }

    #lt-content::before {
      content: '';
      position: absolute;
      bottom: 0; left: 5px; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, transparent);
    }

    #lt-name {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1.1;
      white-space: nowrap;
    }

    #lt-title {
      font-size: 16px;
      font-weight: 400;
      color: #a78bfa;
      margin-top: 3px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="lower-third">
    <div id="lt-content">
      <div id="lt-name">Nombre Completo</div>
      <div id="lt-title">Cargo o descripción</div>
    </div>
  </div>

  <script>
    // Leer variables de la URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById('lt-name').textContent  = params.get('nombre') || 'Nombre Completo';
    document.getElementById('lt-title').textContent = params.get('cargo')  || 'Cargo o descripción';

    // Animación automática de entrada
    const lt = document.getElementById('lower-third');
    setTimeout(() => lt.classList.add('in'), 100);

    // Escuchar señal de OUT desde el motor
    window.addEventListener('message', (e) => {
      if (e.data?.action === 'out') {
        lt.classList.remove('in');
        lt.classList.add('out');
      }
      if (e.data?.action === 'update') {
        const v = e.data.variables || {};
        if (v.nombre) document.getElementById('lt-name').textContent  = v.nombre;
        if (v.cargo)  document.getElementById('lt-title').textContent = v.cargo;
      }
    });
  </script>
</body>
</html>
