<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Breaking News Banner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Roboto', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 50px;
    }

    .banner-wrapper {
      width: 1700px;
      position: relative;
      opacity: 0;
      transform: translateY(100px);
      transition: none;
    }

    .banner-wrapper.active {
      opacity: 1;
      transform: translateY(0);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
    }

    .banner-wrapper.exit {
      opacity: 0;
      transform: translateY(100px);
      transition: transform 0.5s ease-in, opacity 0.5s ease;
    }

    .banner-container {
      display: flex;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      border-radius: 4px;
      overflow: hidden;
    }

    .breaking-label {
      background: #e60000;
      color: white;
      font-family: 'Teko', sans-serif;
      font-size: 54px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
    }

    .breaking-label::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: flash 3s infinite;
    }

    @keyframes flash {
      0%, 80% { left: -100%; }
      100% { left: 200%; }
    }

    .headline-content {
      background: rgba(15, 20, 25, 0.95);
      backdrop-filter: blur(10px);
      color: white;
      flex-grow: 1;
      padding: 16px 40px;
      display: flex;
      align-items: center;
    }

    .headline-text {
      font-size: 38px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

  </style>
</head>
<body>

  <div class="banner-wrapper" id="panel">
    <div class="banner-container">
      <div class="breaking-label" id="label">ÚLTIMA HORA</div>
      <div class="headline-content">
        <div class="headline-text" id="headline">EL TITULAR DE LA NOTICIA PRINCIPAL VA AQUÍ Y PUEDE SER LARGO</div>
      </div>
    </div>
  </div>

  <script>
    let isVisible = false;
    const panel = document.getElementById('panel');

    function play() {
      if (isVisible) {
        panel.classList.remove('active');
        panel.classList.add('exit');
        setTimeout(() => panel.classList.remove('exit'), 600); 
        isVisible = false;
      } else {
        panel.classList.remove('exit');
        void panel.offsetWidth;
        panel.classList.add('active');
        isVisible = true;
      }
    }

    function update(incomingChange) {
      try {
        const changes = JSON.parse(incomingChange);
        Object.entries(changes).forEach(([key, value]) => {
          const el = document.getElementById(key);
          if (el && value !== undefined) {
            el.innerText = value;
          }
        });
      } catch (e) {
        console.error("Error al actualizar:", e);
      }
    }
  
    // Fallback: escuchar mensajes postMessage de Orbit y leer URL params
    window.addEventListener('message', (e) => {
      if (e.data?.action === 'update' && e.data.variables) {
        if (typeof update === 'function') {
          update(JSON.stringify(e.data.variables));
        }
      }
      if (e.data?.action === 'out') {
        if (typeof play === 'function') {
          if (isVisible) play();
        }
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const vars = {};
      for(let [k,v] of params) {
        if(k !== 'path') vars[k] = v;
      }
      if(Object.keys(vars).length > 0 && typeof update === 'function') {
        update(JSON.stringify(vars));
      }
    });
  </script>

  <script name="graphics-data-definition" type="application/json+gdd">
    {
      "$schema": "https://superflytv.github.io/GraphicsDataDefinition/gdd-meta-schema/v1/schema.json",
      "title": "Breaking News Banner",
      "type": "object",
      "properties": {
        "label": {
          "type": "string",
          "label": "Etiqueta (Ej: ÚLTIMA HORA)",
          "default": "ÚLTIMA HORA",
          "gddType": "single-line"
        },
        "headline": {
          "type": "string",
          "label": "Titular de la Noticia",
          "default": "EL TITULAR DE LA NOTICIA PRINCIPAL VA AQUÍ",
          "gddType": "single-line"
        }
      }
    }
  </script>
</body>
</html>
