<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lower Third Animated</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #lt-wrap {
      position: absolute;
      bottom: 110px;
      left: 0;
      right: 0;
    }

    /* Barra de acento animada */
    #lt-bar {
      position: absolute;
      left: 80px;
      bottom: 0;
      height: 3px;
      width: 0;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    /* Contenedor de texto */
    #lt-box {
      position: absolute;
      left: 80px;
      bottom: 8px;
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.55s cubic-bezier(0.16,1,0.3,1) 0.1s;
      background: linear-gradient(135deg, rgba(15,10,30,0.95), rgba(30,20,60,0.9));
      backdrop-filter: blur(12px);
      border-radius: 6px;
      padding: 12px 24px;
      border-top: 1px solid rgba(124,58,237,0.4);
      box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    #lt-box.in {
      clip-path: inset(0 0% 0 0);
    }

    #lt-bar.in {
      width: 500px;
    }

    /* OUT */
    #lt-box.out {
      clip-path: inset(0 100% 0 0);
      transition: clip-path 0.4s cubic-bezier(0.7,0,0.8,1);
    }
    #lt-bar.out {
      width: 0;
      transition: width 0.4s cubic-bezier(0.7,0,0.8,1) 0.1s;
    }

    #lt-name {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    #lt-role {
      font-size: 14px;
      font-weight: 400;
      color: #a78bfa;
      margin-top: 2px;
      white-space: nowrap;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7c3aed;
      margin-right: 8px;
      vertical-align: middle;
      box-shadow: 0 0 6px #7c3aed;
    }
  </style>
</head>
<body>
  <div id="lt-wrap">
    <div id="lt-bar"></div>
    <div id="lt-box">
      <div id="lt-name"><span class="dot"></span><span id="name-text">Nombre Completo</span></div>
      <div id="lt-role" id="role-text">Cargo · Institución</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('name-text').textContent = params.get('nombre') || 'Nombre Completo';
    document.getElementById('lt-role').textContent   = params.get('cargo')  || 'Cargo · Institución';

    const box = document.getElementById('lt-box');
    const bar = document.getElementById('lt-bar');

    setTimeout(() => {
      bar.classList.add('in');
      box.classList.add('in');
    }, 150);

    window.addEventListener('message', (e) => {
      if (e.data?.action === 'out') {
        box.classList.remove('in'); box.classList.add('out');
        bar.classList.remove('in'); bar.classList.add('out');
      }
      if (e.data?.action === 'update') {
        const v = e.data.variables || {};
        if (v.nombre) document.getElementById('name-text').textContent = v.nombre;
        if (v.cargo)  document.getElementById('lt-role').textContent   = v.cargo;
      }
    });
  </script>
</body>
</html>
